<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projection fleurs</title>

<style>

body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

/* écran sessions */
#sessionScreen{
  padding:40px;
}

.sessionBtn{
  padding:15px 25px;
  margin:10px;
  font-size:18px;
  cursor:pointer;
  border:none;
  border-radius:10px;
}

.deleteBtn{
  padding:10px;
  margin-left:10px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#addSession{
  font-size:30px;
  padding:10px 20px;
  margin-top:20px;
}

/* écran projection */
#projection{
  display:none;
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

.flower{
  position:absolute;
  width:150px;
  animation: pop 0.5s ease;
}

@keyframes pop{
  from{
    transform:scale(0);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

/* bouton retour invisible */
#backZone{
  position:fixed;
  top:0;
  left:0;
  width:120px;
  height:120px;
  z-index:10;
  cursor:pointer;
  opacity:0;
}

</style>
</head>

<body>

<!-- écran sessions -->
<div id="sessionScreen">

<h1>Choisir une session</h1>

<div id="sessions"></div>

<button id="addSession">➕ Ajouter session</button>

</div>

<!-- écran projection -->
<div id="projection">

<div id="backZone"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDU0ZfDugkQfm5DDNmAg7H_B1BuAc6aXzs",
  authDomain: "fleurs-44164.firebaseapp.com",
  projectId: "fleurs-44164",
  storageBucket: "fleurs-44164.firebasestorage.app",
  messagingSenderId: "720571774567",
  appId: "1:720571774567:web:50a1bac10d685dbf1bc6c2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const sessionsDiv = document.getElementById("sessions");
const projection = document.getElementById("projection");
const sessionScreen = document.getElementById("sessionScreen");
const backZone = document.getElementById("backZone");

let currentSession = null;
let unsubscribe = null;

////////////////////////////
// AJOUT SESSION
////////////////////////////

document.getElementById("addSession").onclick = () => {

  db.collection("sessions").add({
    time: Date.now()
  });

};

////////////////////////////
// AFFICHER SESSIONS
////////////////////////////

db.collection("sessions")
.orderBy("time")
.onSnapshot(snapshot => {

  sessionsDiv.innerHTML = "";

  let index = 1;

  snapshot.forEach(doc => {

    const container = document.createElement("div");

    const btn = document.createElement("button");
    btn.className = "sessionBtn";
    btn.innerText = "Session " + index;

    btn.onclick = () => startSession(doc.id);

    const del = document.createElement("button");
    del.className = "deleteBtn";
    del.innerText = "🗑️";

    del.onclick = () => deleteSession(doc.id);

    container.appendChild(btn);
    container.appendChild(del);

    sessionsDiv.appendChild(container);

    index++;

  });

});

////////////////////////////
// SUPPRIMER SESSION
////////////////////////////

function deleteSession(id){

  if(!confirm("Supprimer cette session ?")) return;

  db.collection("sessions").doc(id).delete();

  db.collection("flowers")
    .where("session","==",id)
    .get()
    .then(snapshot => {

      snapshot.forEach(doc => {
        doc.ref.delete();
      });

    });

}

////////////////////////////
// DEMARRER SESSION
////////////////////////////

function startSession(sessionId){

  currentSession = sessionId;

  // 🔥 on sauvegarde la session active
  db.collection("config")
    .doc("activeSession")
    .set({
      id: sessionId
    });

  sessionScreen.style.display = "none";
  projection.style.display = "block";

  listenFlowers();
}

////////////////////////////
// RETOUR INVISIBLE
////////////////////////////

backZone.onclick = () => {

  projection.style.display = "none";
  sessionScreen.style.display = "block";

  projection.innerHTML = '<div id="backZone"></div>';

  if(unsubscribe){
    unsubscribe();
  }

};

////////////////////////////
// ECOUTER FLEURS
////////////////////////////

function listenFlowers(){

  if(unsubscribe){
    unsubscribe();
  }

  unsubscribe = db.collection("flowers")
  .where("session","==",currentSession)
  .orderBy("time")
  .onSnapshot(snapshot => {

    snapshot.docChanges().forEach(change => {

      if(change.type === "added"){

        createFlower(change.doc.data().image);

      }

    });

  });

}

////////////////////////////
// CREER FLEUR
////////////////////////////

function createFlower(src){

  const img = document.createElement("img");

  img.src = src;
  img.className = "flower";

  const x = Math.random() * (window.innerWidth - 150);
  const y = Math.random() * (window.innerHeight - 150);

  img.style.left = x + "px";
  img.style.top = y + "px";

  projection.appendChild(img);

}

</script>

</body>
</html>
